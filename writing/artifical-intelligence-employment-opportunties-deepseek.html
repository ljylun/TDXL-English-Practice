<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>AI与就业 · 学术写作六维深度解析</title>

      box-sizing: border-box;

      display: flex;

      color: #1e1e2f;

      width: 100%;
      background: #ffffff;
      border-radius: 2.5rem;

      margin-bottom: 2rem;

      font-weight: 600;
      color: #0b2b44;

      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: #4a4a6a;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      font-style: italic;
      margin-left: 2.5rem;
    }
    .sentence-block {
      background: #f9fafc;
      border: 1px solid #e2e8f0;
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 2rem 0;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      transition: all 0.2s;

    .sentence-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .sentence-id {
      background: #1e2b4f;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 0.3rem 1rem;
      border-radius: 3rem;
      letter-spacing: 0.5px;
    }

      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.5;
      background: white;
      padding: 0.8rem 1.2rem;
      border-radius: 1.5rem;
      display: inline-block;
      margin-right: 1rem;
      color: #0d1b2a;
      border: 1px solid #dce3eb;
      flex: 1;
    }
    /* 句中彩色标签 */
    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.6rem;
      border-radius: 2rem;
      display: inline-block;
      margin-left: 0.3rem;
      background: #eef2f6;
      color: #1e293b;
      white-space: nowrap;
    }
    .tense { background: #dbeafe; color: #1e40af; }
    .voice { background: #f1f5f9; color: #334155; }
    .clause { background: #ede9fe; color: #5b21b6; }
    .special { background: #fff7ed; color: #9a3412; }

    .section-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin: 1.5rem 0 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid #cbd5e1;
      color: #0f172a;
    }
    .color-label {
      display: inline-block;
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 50%;
      margin-right: 0.3rem;
    }
    /* 成分颜色 */
    .subj { background: #2563eb; } /* 蓝 */
    .pred { background: #16a34a; } /* 绿 */
    .obj { background: #f97316; } /* 橙 */
    .attr { background: #a855f7; } /* 紫 */
    .adv { background: #ef4444; } /* 红 */
    .comp { background: #6b7280; } /* 灰 */

    .inline-code {
      background: #f1f5f9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.4rem;
      color: #0f172a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.9rem;
      background: white;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    th {
      background: #1e293b;
      color: white;
      font-weight: 600;
      padding: 0.7rem;
      text-align: left;
    }
    td {
      padding: 0.7rem;
      border-bottom: 1px solid #e9eef2;
      vertical-align: top;
    }
    .tree-box {
      background: #f8fafd;
      border: 1px dashed #94a3b8;
      padding: 1rem;
      border-radius: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
      font-size: 0.85rem;
      line-height: 1.6;
      margin: 0.5rem 0;
      color: #0b1e33;
    }
    .template-box {
      background: #eff6ff;
      border-left: 5px solid #2563eb;
      padding: 0.8rem 1.2rem;
      margin: 1rem 0;
      border-radius: 0.7rem;
      font-weight: 500;
    }
    .mnemonic {
      background: #fef9c3;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      display: inline-block;
      font-weight: 600;
    }
    .example-sentence {
      margin: 0.4rem 0;
      padding-left: 1rem;
      border-left: 3px solid #94a3b8;
      color: #334155;
    }
    hr {
      margin: 2rem 0 1rem;
      border: 0.5px solid #d1d9e6;
    }
    .index-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .index-card {
      background: #ffffff;
      border: 1px solid #cfdde7;
      border-radius: 1rem;
      padding: 1rem;
    }
    button {
      background: none;
      border: none;
      color: #2563eb;
      cursor: pointer;
      font-weight: 500;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
  </style>
</head>
<body>
<div class="report-container" id="top">
  <h1>🤖 AI与就业 · 学术写作深度解析</h1>
  <div class="subtitle">基于六维度语法词汇框架 · 适用于IELTS/TOEFL/SCI教学</div>

  <!-- 动态内容由JavaScript生成，便于维护彩色标签与结构 -->
  <div id="analysis-content"></div>

  <!-- 一键检索索引 -->
  <div style="margin-top: 3rem; background: #f2f6fc; border-radius: 2rem; padding: 1.8rem;">
    <h2 style="color:#0b2b44; margin-bottom:1.2rem;">🔎 一键检索索引 (搭配/句型/编号)</h2>
    <div class="index-grid" id="index-area"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- 句子数据定义 ----------
    const sentences = [
      {

        text: "As artificial intelligence rapidly advances, concerns about job displacement have grown significantly.",

          grammar: {

            note: "As引导的状语从句在学术写作中高频使用，用于表示伴随原因或时间背景。SCI引言中常用来描述技术发展背景，IELTS Task2开头段引入话题可获Coherence & Cohesion加分。"
          },
          vocabulary: [
            {word:"artificial", ipa:"/ˌɑːr.tɪˈfɪʃ.əl/", pos:"adj.", meaning:"人造的；人工的", level:"B2", awl:"AWL-3"},
            {word:"intelligence", ipa:"/ɪnˈtel.ɪ.dʒəns/", pos:"n.", meaning:"智力；智能", level:"B2", awl:"AWL-6"},
            {word:"rapidly", ipa:"/ˈræp.ɪd.li/", pos:"adv.", meaning:"迅速地", level:"B2", awl:"-"},

            {word:"grown", ipa:"/ɡrəʊn/", pos:"v.", meaning:"增长；变得", level:"B1", awl:"-"},
            {word:"significantly", ipa:"/sɪɡˈnɪf.ɪ.kənt.li/", pos:"adv.", meaning:"显著地", level:"B2", awl:"AWL-1"}
          ],
          collocations: [
            {type:"V+N", phrase:"have grown concerns", meaning:"担忧增加", register:"正式", position:"concerns ... have grown"},
            {type:"Adj+N", phrase:"artificial intelligence", meaning:"人工智能", register:"中性/正式", position:"artificial intelligence"},

      },
      {
        id: "S2",
        text: "Some fear widespread unemployment, while others believe AI will create new opportunities and drive industrial upgrading.",

            tense: "一般现在时(fear/believe) ; 宾语从句中一般将来时(will create)",
            voice: "主动",

          collocations: [
            {type:"V+N", phrase:"fear unemployment", meaning:"担心失业", register:"中性", position:"fear widespread unemployment"},

            {type:"V+N", phrase:"drive upgrading", meaning:"推动升级", register:"正式", position:"drive industrial upgrading"},

        }
      },
      {
        id: "S3",
        text: "In my opinion, AI should be viewed as a transformative force that reshapes work rather than simply eliminates it.",
        analysis: {
          grammar: {
            tense: "情态动词被动语态(should be viewed)；定语从句一般现在时(reshapes)",
            voice: "被动语态(should be viewed)",
            clauseTypes: "定语从句(that reshapes ...) 修饰force",
            special: "rather than 平行对比；插入语In my opinion",
            note: "should be viewed 为学术推荐语气，定语从句精确定义属性。IELTS观点类结尾常用。"

          vocabulary: [
            {word:"opinion", ipa:"/əˈpɪn.jən/", pos:"n.", meaning:"观点", level:"A2", awl:"-"},

          collocations: [
            {type:"固定短语", phrase:"in my opinion", meaning:"在我看来", register:"中性", position:"In my opinion"},
            {type:"Adj+N", phrase:"transformative force", meaning:"变革力量", register:"正式", position:"transformative force"},
            {type:"V+N", phrase:"reshapes work", meaning:"重塑工作", register:"正式", position:"reshapes work"},
            {type:"连接词", phrase:"rather than", meaning:"而不是", register:"正式", position:"rather than simply eliminates"}

          tree: "主句: AI should be viewed as a transformative force \n   └─ 定语从句: that reshapes work rather than eliminates it.",
          maxNest: 1,
          readability: "定语从句带rather than对比，学术性强。"
        }
      },
      {
        id: "S4",
        text: "On the one hand, AI does automate certain routine tasks, potentially displacing some workers in traditional industries.",
        analysis: {
          grammar: {
            tense: "一般现在时(does automate 强调)",
            voice: "主动",
            clauseTypes: "简单句+现在分词短语作结果状语",
            special: "强调助动词does；现在分词短语displacing...",
            note: "does automate 强调结构在学术写作中可增强论点力度。分词状语表达伴随结果。"
          },
          vocabulary: [
            {word:"automate", ipa:"/ˈɔː.tə.meɪt/", pos:"v.", meaning:"自动化", level:"B2", awl:"AWL-5"},
            {word:"routine", ipa:"/ruːˈtiːn/", pos:"adj.", meaning:"常规的", level:"B1", awl:"-"},
            {word:"tasks", ipa:"/tæsks/", pos:"n.", meaning:"任务", level:"A2", awl:"-"},
            {word:"potentially", ipa:"/pəˈten.ʃəl.i/", pos:"adv.", meaning:"潜在地", level:"B2", awl:"AWL-2"},

          collocations: [
            {type:"V+N", phrase:"automate tasks", meaning:"自动化任务", register:"正式", position:"automate certain routine tasks"},

            {type:"固定短语", phrase:"on the one hand", meaning:"一方面", register:"正式", position:"On the one hand"}

          readability: "强调结构+分词状语，句法紧凑。"

          tree: "简单句: manufacturing robots ... have replaced ... positions.",
          maxNest:0, readability:"举例清晰。"

      },
      {
        id: "S6",
        text: "On the other hand, it generates demand for new skills and creates emerging job categories in fields like AI development, data analysis, and human-machine collaboration.",

          grammar: { tense:"一般现在时", voice:"主动", clauseTypes:"简单句(并列谓语)", special:"平行结构(generates...and creates...); like举例", note:"平行谓语提升信息密度。" },
          vocabulary: [
            {word:"generates", ipa:"/ˈdʒen.ə.reɪts/", pos:"v.", meaning:"产生", level:"B2", awl:"AWL-4"},

          grammar: { tense:"一般现在时", voice:"主动", clauseTypes:"简单句", special:"无", note:"责任分担表达。" },
          vocabulary: [
            {word:"share", ipa:"/ʃeər/", pos:"v.", meaning:"分担", level:"A2", awl:"-"},
            {word:"responsibility", ipa:"/rɪˌspɒn.sɪˈbɪl.ə.ti/", pos:"n.", meaning:"责任", level:"B1", awl:"AWL-1"},
            {word:"retraining", ipa:"/ˌriːˈtreɪ.nɪŋ/", pos:"n.", meaning:"再培训", level:"C1", awl:"-"}
          ],
          collocations: [
            {type:"V+N", phrase:"share responsibility", meaning:"分担责任", register:"正式", position:"share the responsibility"}
          ],
          tree: "简单句。"
        }
      },
      {
        id: "S10",
        text: "By embracing skill development and maintaining flexibility, workers can turn this challenge into an opportunity for career growth in the AI era.",
        analysis: {
          grammar: { tense:"情态动词can turn", voice:"主动", clauseTypes:"简单句+介词短语作方式状语", special:"By doing平行结构", note:"方式状语前置。" },
          vocabulary: [
            {word:"embracing", ipa:"/ɪmˈbreɪ.sɪŋ/", pos:"v.", meaning:"拥抱；接受", level:"B2", awl:"-"},
            {word:"flexibility", ipa:"/ˌflek.sɪˈbɪl.ə.ti/", pos:"n.", meaning:"灵活性", level:"B2", awl:"AWL-6"},
            {word:"turn", ipa:"/tɜːrn/", pos:"v.", meaning:"转变", level:"B1", awl:"-"},
            {word:"challenge", ipa:"/ˈtʃæl.ɪndʒ/", pos:"n.", meaning:"挑战", level:"B1", awl:"AWL-3"},
            {word:"opportunity", ipa:"/ˌɒp.əˈtjuː.nə.ti/", pos:"n.", meaning:"机会", level:"B1", awl:"AWL-2"}
          ],
          collocations: [
            {type:"V+N", phrase:"turn challenge into opportunity", meaning:"化挑战为机遇", register:"正式", position:"turn this challenge into an opportunity"}
          ],
          tree: "状语: By embracing ... and maintaining ..., 主句: workers can turn ..."
        }
      }
    ];

    // 辅助函数：生成彩色标签HTML
    function colorSpan(text, type) {
      return `<span class="tag ${type}">${text}</span>`;
    }

    // 生成每个句子的完整HTML块
    function renderSentenceBlock(s) {
      const grammar = s.analysis.grammar;
      const vocab = s.analysis.vocabulary || [];
      const colls = s.analysis.collocations || [];
      const tree = s.analysis.tree || "";
      
      // 语法标签
      const tagsHtml = `
        ${colorSpan('时态:'+grammar.tense, 'tense')}
        ${colorSpan('语态:'+grammar.voice, 'voice')}
        ${colorSpan('从句:'+grammar.clauseTypes, 'clause')}
        ${grammar.special ? colorSpan('特殊:'+grammar.special, 'special') : ''}
      `;

      // 词汇表格
      let vocabRows = vocab.map(v => `
        <tr>
          <td>${v.word}</td><td>${v.ipa}</td><td>${v.pos}</td><td>${v.meaning}</td>
          <td>${v.level || '-'}</td><td>${v.awl || '-'}</td>
        </tr>
      `).join('');

      // 搭配表格
      let collRows = colls.map(c => `
        <tr>
          <td>${c.type}</td><td>${c.phrase}</td><td>${c.meaning}</td><td>${c.register}</td><td>${c.position}</td>
        </tr>
      `).join('');

      // 句子成分树状图（彩色标记）
      const treeColored = tree
        .replace(/主/g, '<span style="color:#2563eb;font-weight:bold;">主</span>')
        .replace(/谓/g, '<span style="color:#16a34a;font-weight:bold;">谓</span>')
        .replace(/宾/g, '<span style="color:#f97316;font-weight:bold;">宾</span>')
        .replace(/定/g, '<span style="color:#a855f7;font-weight:bold;">定</span>')
        .replace(/状/g, '<span style="color:#ef4444;font-weight:bold;">状</span>')
        .replace(/补/g, '<span style="color:#6b7280;font-weight:bold;">补</span>');

      // 仿写例句（手动预设）
      const imitations = {
        S1: ["As climate change intensifies, worries about food security have risen dramatically. (B2/AWL-3)", "As digital transformation accelerates, demand for cybersecurity experts has grown substantially. (C1/AWL-5)"],
        S2: ["Some predict economic recession, while others anticipate a swift recovery. (B2)", "Some emphasize individual effort, while others highlight systemic support. (C1)"],
        S3: ["In my view, education should be regarded as a lifelong journey that empowers individuals rather than merely certifies them. (B2/AWL-6)"],
        S4: ["On the one hand, automation does reduce manual labour, possibly displacing factory workers. (B2)"],
        S5: ["For instance, chatbots have already taken over many enquiry-handling roles. (B1)"],
        S6: ["On the other hand, digitalization creates demand for data analysts and AI ethicists. (C1)"],
        S7: ["Moreover, schools are increasingly using AI to personalize learning. (B2)"],
        S8: ["Therefore, the solution lies in policy innovation. (B1)"],
        S9: ["Companies also bear the responsibility of upskilling employees. (B2)"],
        S10: ["By adopting new technologies, firms can turn disruption into advantage. (C1/AWL-6)"]
      };

      const imitList = (imitations[s.id] || []).map(e => `<div class="example-sentence">🔹 ${e}</div>`).join('');

      return `
        <div class="sentence-block" id="sent-${s.id}">
          <div class="sentence-header">
            <span class="sentence-id">${s.id}</span>
            <span class="quote-text">${s.text}</span>
            <div>${tagsHtml}</div>
          </div>
          
          <div><strong>📘 语法学术提示：</strong> ${grammar.note}</div>
          
          <div class="section-title">📚 词汇原型 (CEFR/AWL)</div>
          <table><thead><tr><th>词</th><th>音标</th><th>词性</th><th>释义</th><th>CEFR</th><th>AWL</th></tr></thead><tbody>${vocabRows}</tbody></table>
          
          <div class="section-title">🔗 词汇搭配</div>
          <table><thead><tr><th>类型</th><th>搭配</th><th>释义</th><th>语域</th><th>位置</th></tr></thead><tbody>${collRows}</tbody></table>
          
          <div class="section-title">🧩 句子成分树状图</div>
          <div class="tree-box">${treeColored}</div>
          <div><span class="inline-code">嵌套层级：${s.analysis.maxNest}</span> · ${s.analysis.readability || '清晰'}</div>
          
          <div class="section-title">🧠 记忆方法与模板</div>
          <div class="template-box">📌 模板：${s.id.startsWith('S1')?'As + 名词 + 副词 + 动词, 名词 + 完成时': s.id.startsWith('S2')?'Some + 动词 + 名词, while others + 动词 + 宾语从句': s.id.startsWith('S3')?'In my opinion, 主语 + 情态被动 + as + 名词 + 定语从句': '见仿写'}</div>
          <div><span class="mnemonic">💡 口诀：${s.id==='S1'?'随着AI快发展，担忧显著增长':'结构对比，观点平衡'}</span></div>
          
          <div class="section-title">✍️ 仿写例句 (保持结构)</div>
          ${imitList}
          
          <div class="section-title">🎯 应用场景</div>
          <div>✅ 雅思Task2：${s.id.includes('S1')?'同意与否/双边讨论开头': s.id.includes('S2')?'双边讨论对比': '观点/结论'} | 托福：${s.id.includes('S4')?'综合写作对比': '学术讨论'} | 论文章节：${s.id.includes('S1')?'引言': s.id.includes('S8')?'结论': '讨论/方法'} | 正式等级：4/5 (学术期刊)</div>
        </div>
      `;
    }

    // 渲染所有句子
    const container = document.getElementById('analysis-content');
    let allHtml = '';
    sentences.forEach(s => { allHtml += renderSentenceBlock(s); });
    container.innerHTML = allHtml;

    // 生成索引
    const indexArea = document.getElementById('index-area');
    let indexItems = [];
    sentences.forEach(s => {
      const colls = s.analysis.collocations || [];
      colls.forEach(c => {
        indexItems.push(`<div class="index-card"><strong>${c.phrase}</strong> (${c.type}) · ${c.meaning} <br><a href="#sent-${s.id}">→ ${s.id}</a></div>`);
      });
      // 句型模板
      indexItems.push(`<div class="index-card"><strong>📐 句型模板</strong> ${s.id} <br><a href="#sent-${s.id}">查看句子</a></div>`);
    });
    indexArea.innerHTML = indexItems.join('');
  })();
</script>
</body>
</html>
