<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="密码学基础考试复习应用 — 涵盖代数结构、初等数论、多项式理论、群论、环与域等核心知识点的交互式学习平台">
  <meta name="keywords" content="密码学,考试复习,代数结构,数论,群论,有限域">
  <title>密码学基础 — 考试复习</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="document.addEventListener('DOMContentLoaded', () => { if(typeof renderMathInElement==='function') renderMathInElement(document.body, {delimiters:[{left:'\\\\(',right:'\\\\)',display:false},{left:'\\\\[',right:'\\\\]',display:true},{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}); })"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
  <!-- Background Decoration -->
  <div class="bg-decoration"></div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🔐</div>
        <div>
          <div class="sidebar-title">密码学基础</div>
          <div class="sidebar-subtitle">考试复习</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="nav-section-title">概览</div>
        <div class="nav-item dashboard-item active" data-target="dashboard" id="nav-dashboard">
          <div class="nav-icon">📊</div>
          <div class="nav-label">学习仪表盘</div>
        </div>

        <div class="nav-section-title">章节</div>
        <!-- Chapter nav items will be generated by JS -->
        <div id="chapter-nav-list"></div>
      </nav>

      <div class="sidebar-footer">
        <div class="nav-item" id="nav-reset" title="重置所有进度">
          <div class="nav-icon">🔄</div>
          <div class="nav-label">重置进度</div>
        </div>
      </div>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="切换菜单">☰</button>
          <div class="breadcrumb" id="breadcrumb">
            <span>密码学基础</span>
            <span class="breadcrumb-separator">›</span>
            <span class="breadcrumb-current" id="breadcrumb-current">学习仪表盘</span>
          </div>
        </div>
        <div class="header-right">
          <div class="mode-switcher" id="mode-switcher" style="display:none;">
            <button class="mode-btn active" data-mode="study" id="mode-study-btn">📖 知识浏览</button>
            <button class="mode-btn" data-mode="quiz" id="mode-quiz-btn">✏️ 自测练习</button>
          </div>
          <button class="theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换主题">
            🌙
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area" id="content-area">
        <!-- Content will be rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="data/questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
